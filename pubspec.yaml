name: spacenews_core
description: SpaceNews Core - Advanced International News Portal
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  shared_preferences: ^2.3.2
  http: ^1.2.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
